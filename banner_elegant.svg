<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Syamsuardi - Backend & Frontend Developer</title>
<defs>
  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes scanline { 0%{transform:translateY(-200px)} 100%{transform:translateY(200px)} }
    .t1{animation:fadeUp .8s ease both}
    .t2{animation:fadeUp .8s ease .2s both}
    .t3{animation:fadeUp .8s ease .4s both}
    .cursor{animation:blink 1s step-end infinite}
    .scan{animation:scanline 4s linear infinite}
  </style>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#080c12"/>
    <stop offset="100%" stop-color="#0c1220"/>
  </linearGradient>
  <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#c8a96e" stop-opacity="0"/>
    <stop offset="30%" stop-color="#c8a96e" stop-opacity="0.8"/>
    <stop offset="70%" stop-color="#c8a96e" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clip"><rect width="800" height="200" rx="0"/></clipPath>
</defs>

<rect width="800" height="200" fill="url(#bg)"/>

<!-- Subtle grid -->
<g opacity="0.04" stroke="#c8a96e" stroke-width="0.5">
  <line x1="0" y1="50" x2="800" y2="50"/>
  <line x1="0" y1="100" x2="800" y2="100"/>
  <line x1="0" y1="150" x2="800" y2="150"/>
  <line x1="200" y1="0" x2="200" y2="200"/>
  <line x1="400" y1="0" x2="400" y2="200"/>
  <line x1="600" y1="0" x2="600" y2="200"/>
</g>

<!-- Scan line effect -->
<rect class="scan" x="0" y="0" width="800" height="3" fill="#c8a96e" opacity="0.04" clip-path="url(#clip)"/>

<!-- Left accent bar -->
<rect x="60" y="52" width="2" height="96" fill="#c8a96e" opacity="0.7"/>

<!-- Name -->
<text class="t1" x="80" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" letter-spacing="6" fill="#e8dcc8">SYAMSUARDI</text>

<!-- Gold accent line -->
<rect class="t2" x="80" y="100" width="320" height="1" fill="url(#line)" opacity="0.6"/>

<!-- Role -->
<text class="t2" x="82" y="124" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#c8a96e" opacity="0.9">BACKEND &amp; FRONTEND DEVELOPER</text>

<!-- Location -->
<text class="t3" x="82" y="148" font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#6b7fa3" opacity="0.8">MAKASSAR, INDONESIA  ·  UIN ALAUDDIN  ·  INFORMATION SYSTEMS</text>

<!-- Right side — decorative bracket -->
<text x="650" y="95" font-family="Georgia, serif" font-size="80" fill="#c8a96e" opacity="0.06">{</text>
<text x="720" y="95" font-family="Georgia, serif" font-size="80" fill="#c8a96e" opacity="0.06">}</text>

<!-- Cursor blink -->
<rect class="cursor" x="82" y="157" width="8" height="2" fill="#c8a96e" opacity="0.7"/>

<!-- Corner marks -->
<path d="M20,20 L20,8 L32,8" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.3"/>
<path d="M780,20 L780,8 L768,8" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.3"/>
<path d="M20,180 L20,192 L32,192" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.3"/>
<path d="M780,180 L780,192 L768,192" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.3"/>
</svg>
