<!-- GitHub -->
<g class="i1" transform="translate(388,68)">
  <circle cx="21" cy="21" r="21" fill="#fff"/>
  <text x="21" y="28" font-family="Arial,sans-serif" font-size="22" fill="#24292e" text-anchor="middle">⑂</text>
</g>
<!-- REST API -->
<g class="i2" transform="translate(446,70)">
  <rect width="50" height="26" rx="13" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.7"/>
  <text x="25" y="18" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#00d9ff" text-anchor="middle">REST API</text>
</g>
<!-- MongoDB -->
<g class="i3" transform="translate(510,68)">
  <rect width="48" height="28" rx="6" fill="#4DB33D"/>
  <text x="24" y="19" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">MongoDB</text>
</g>
<!-- Nginx -->
<g class="i4" transform="translate(572,68)">
  <rect width="44" height="28" rx="6" fill="#009900"/>
  <text x="22" y="19" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">nginx</text>
</g>

<!-- Greeting -->
<g class="g-text">
  <text x="330" y="162" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="600" fill="#e6f1fb" text-anchor="middle">Hi there, I'm Syamsuardi</text>
  <text x="470" y="163" font-family="sans-serif" font-size="20" text-anchor="middle" class="wave">👋</text>
  <text x="340" y="188" font-family="'Courier New',monospace" font-size="13" fill="#00d9ff" text-anchor="middle" opacity="0.85">Backend Developer · Makassar, Indonesia 🇮🇩</text>
</g>

<!-- Glow dots -->
<circle cx="30" cy="180" r="1.5" fill="#00d9ff" opacity="0.4"/>
<circle cx="650" cy="170" r="1.5" fill="#00d9ff" opacity="0.4"/>
<circle cx="340" cy="230" r="1.5" fill="#00d9ff" opacity="0.3"/>
</svg>
