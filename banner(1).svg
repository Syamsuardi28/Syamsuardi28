<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
<title>Syamsuardi - Backend and Frontend Developer</title>
<defs>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(210px)}}
    .t1{animation:fadeUp .8s ease both}
    .t2{animation:fadeUp .8s ease .25s both}
    .t3{animation:fadeUp .8s ease .5s both}
    .cur{animation:blink 1.1s step-end infinite}
    .sl{animation:scan 5s linear infinite}
  </style>
  <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#070b11"/>
    <stop offset="100%" stop-color="#0b1120"/>
  </linearGradient>
  <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#c8a96e" stop-opacity="0"/>
    <stop offset="25%" stop-color="#c8a96e" stop-opacity="0.7"/>
    <stop offset="75%" stop-color="#c8a96e" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="cp"><rect width="800" height="200"/></clipPath>
</defs>

<rect width="800" height="200" fill="url(#bg2)"/>

<g stroke="#c8a96e" stroke-width="0.4" opacity="0.04">
  <line x1="0" y1="50" x2="800" y2="50"/>
  <line x1="0" y1="100" x2="800" y2="100"/>
  <line x1="0" y1="150" x2="800" y2="150"/>
  <line x1="200" y1="0" x2="200" y2="200"/>
  <line x1="400" y1="0" x2="400" y2="200"/>
  <line x1="600" y1="0" x2="600" y2="200"/>
</g>

<rect class="sl" x="0" y="0" width="800" height="2" fill="#c8a96e" opacity="0.05" clip-path="url(#cp)"/>

<path d="M22,22 L22,10 L34,10" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.35"/>
<path d="M778,22 L778,10 L766,10" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.35"/>
<path d="M22,178 L22,190 L34,190" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.35"/>
<path d="M778,178 L778,190 L766,190" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.35"/>

<rect class="t1" x="60" y="52" width="2" height="96" fill="#c8a96e" opacity="0.65"/>

<text class="t1" x="82" y="93" font-family="Georgia, serif" font-size="44" font-weight="400" letter-spacing="7" fill="#e8dcc8">SYAMSUARDI</text>

<rect class="t2" x="82" y="103" width="300" height="1" fill="url(#gl)"/>

<text class="t2" x="84" y="127" font-family="Courier New, monospace" font-size="12" letter-spacing="3" fill="#c8a96e" opacity="0.9">BACKEND &amp; FRONTEND DEVELOPER</text>

<text class="t3" x="84" y="152" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#5c7090" opacity="0.9">MAKASSAR, INDONESIA  .  UIN ALAUDDIN  .  INFORMATION SYSTEMS</text>

<rect class="cur" x="84" y="162" width="7" height="2" fill="#c8a96e" opacity="0.65"/>

<text x="630" y="130" font-family="Georgia, serif" font-size="120" fill="#c8a96e" opacity="0.04" font-weight="100">{ }</text>
</svg>
